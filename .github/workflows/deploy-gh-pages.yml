name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
    - master

permissions:
  contents: write

env:
  project-name: MaterialThemingShowcase
  repo-name: MaterialTheming-BlazorShowcase
  release-output: release
  
jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x' 
          
      - name: Publish WebAssembly project
        run: dotnet publish ${{ env.project-name }} -c Release -o ${{ env.release-output }}
          
      - name: Replace base href in index.html
        run: sed -i 's/<base href="\/" \/>/<base href="\/${{ env.repo-name }}\/" \/>/g' ${{ env.release-output }}/wwwroot/index.html
        
      - name: Fix GitHub Pages routing and Jekyll issues
        run: |
          touch ${{ env.release-output }}/wwwroot/.nojekyll
          cp ${{ env.release-output }}/wwwroot/index.html ${{ env.release-output }}/wwwroot/404.html
          
      - name: Commit and Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ${{ env.release-output }}/wwwroot

